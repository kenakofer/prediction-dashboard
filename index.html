<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prediction Watch</title>
  <link rel="stylesheet" href="css/style.css">

  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self' https://cdn.jsdelivr.net 'sha256-yei5Fza+Eyx4G0smvN0xBqEesIKumz6RSyGsU3FJowI='; style-src 'self' 'unsafe-inline'; connect-src https://docs.google.com https://*.googleusercontent.com; img-src 'self' data:;">

  <!-- PapaParse for CSV parsing -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"
          integrity="sha384-D/t0ZMqQW31H3az8ktEiNb39wyKnS82iFY52QPACM+IjKW3jDUhyIgh2PApRqJZs"
          crossorigin="anonymous"></script>

  <!-- Chart.js + plugins -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"
          integrity="sha384-NrKB+u6Ts6AtkIhwPixiKTzgSKNblyhlk0Sohlgar9UHUBzai/sgnNNWWd291xqt"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"
          integrity="sha384-cVMg8E3QFwTvGCDuK+ET4PD341jF3W8nO1auiXfuZNQkzbUUiBGLsIQUE+b1mxws"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"
          integrity="sha384-oNtu+d18330MVFpltUTve1DatxCkkctlpA2AC3GulbVFOSqhHdDat3qHse/Lbuek"
          crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>Prediction Watch</h1>
    <p class="subtitle">Hand-selected prediction market questions across platforms</p>
    <p class="last-updated" id="last-updated"></p>
  </header>

  <main id="dashboard">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Loading market data…</p>
    </div>
    <div id="error-banner" class="error-banner hidden"></div>
    <div id="dashboard-container"></div>
  </main>

  <footer>
    <p>Data sourced from
      <a href="https://manifold.markets" target="_blank">Manifold</a>,
      <a href="https://polymarket.com" target="_blank">Polymarket</a>,
      <a href="https://kalshi.com" target="_blank">Kalshi</a>, and
      <a href="https://metaculus.com" target="_blank">Metaculus</a>.
    </p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
